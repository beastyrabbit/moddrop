name: Build and Push Container Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_frontend:
        description: "Build frontend image"
        type: boolean
        default: true
      build_stream_canvas:
        description: "Build stream-canvas image"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  changes:
    runs-on: arc-beastypage
    if: github.ref == 'refs/heads/main'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      convex: ${{ steps.filter.outputs.convex }}
      stream_canvas: ${{ steps.filter.outputs.stream_canvas }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'next.config.mjs'
              - 'postcss.config.mjs'
              - 'tailwind.config.ts'
              - 'tsconfig.json'
              - 'biome.json'
              - 'components.json'
              - 'Dockerfile'
              - 'docker-entrypoint.sh'
            convex:
              - 'convex/**'
              - 'convex.json'
            stream_canvas:
              - 'backend/stream-canvas/**'

  tag-convex-changes:
    runs-on: arc-beastypage
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      convex: ${{ steps.diff.outputs.convex }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: diff
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          previous_tag=$(
            git tag --sort=-version:refname \
              | grep -Fxv "$CURRENT_TAG" \
              | head -n 1
          )

          if [ -z "$previous_tag" ]; then
            echo "No previous release tag found; deploying Convex by default."
            echo "convex=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$previous_tag..$CURRENT_SHA" -- convex; then
            echo "convex=false" >> "$GITHUB_OUTPUT"
          else
            echo "convex=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-convex:
    needs: [changes, tag-convex-changes]
    if: |
      always() &&
      ((github.ref == 'refs/heads/main' &&
        needs.changes.outputs.convex == 'true') ||
       (startsWith(github.ref, 'refs/tags/v') &&
        needs.tag-convex-changes.outputs.convex == 'true') ||
       github.event.inputs.build_frontend == 'true')
    runs-on: arc-beastypage
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}

  build-frontend:
    needs: changes
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.changes.outputs.frontend == 'true' ||
       github.event.inputs.build_frontend == 'true')
    runs-on: arc-beastypage
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/moddrop-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CONVEX_DEPLOYMENT=${{ secrets.CONVEX_DEPLOYMENT }}
            NEXT_PUBLIC_TLDRAW_LICENSE_KEY=${{ secrets.NEXT_PUBLIC_TLDRAW_LICENSE_KEY }}

  build-stream-canvas:
    needs: changes
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.changes.outputs.stream_canvas == 'true' ||
       github.event.inputs.build_stream_canvas == 'true')
    runs-on: arc-beastypage
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/moddrop-stream-canvas
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/stream-canvas/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
